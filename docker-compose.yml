services:
  deps:
    image: node:22-bookworm-slim
    container_name: zanders-deps
    working_dir: /workspace
    command: >
      sh -lc "corepack enable &&
      corepack prepare pnpm@10.18.2 --activate &&
      pnpm config set store-dir /pnpm/store &&
      pnpm install --frozen-lockfile=false"
    volumes:
      - .:/workspace
      - pnpm_store:/pnpm/store
      - root_node_modules:/workspace/node_modules
      - cms_node_modules:/workspace/apps/cms/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - ui_node_modules:/workspace/packages/ui/node_modules

  postgres:
    image: postgres:16-alpine
    container_name: zanders-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zanders
      POSTGRES_USER: zanders
      POSTGRES_PASSWORD: zanders_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zanders -d zanders"]
      interval: 5s
      timeout: 5s
      retries: 12

  cms:
    image: node:22-bookworm-slim
    container_name: zanders-cms
    working_dir: /workspace
    command: >
      sh -lc "corepack enable &&
      corepack prepare pnpm@10.18.2 --activate &&
      pnpm --filter @zanders/cms dev"
    environment:
      DATABASE_URL: postgresql://zanders:zanders_dev_password@postgres:5432/zanders
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-dev-only-change-me}
      PAYLOAD_PUBLIC_SERVER_URL: http://localhost:3001
      WEB_PUBLIC_URL: http://localhost:3000
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3001:3001"
    volumes:
      - .:/workspace
      - pnpm_store:/pnpm/store
      - root_node_modules:/workspace/node_modules
      - cms_node_modules:/workspace/apps/cms/node_modules
      - cms_next:/workspace/apps/cms/.next
    depends_on:
      deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  web:
    image: node:22-bookworm-slim
    container_name: zanders-web
    working_dir: /workspace
    command: >
      sh -lc "corepack enable &&
      corepack prepare pnpm@10.18.2 --activate &&
      pnpm --filter @zanders/web dev"
    environment:
      CMS_INTERNAL_URL: http://cms:3001
      NEXT_PUBLIC_CMS_URL: http://localhost:3001
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - pnpm_store:/pnpm/store
      - root_node_modules:/workspace/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - ui_node_modules:/workspace/packages/ui/node_modules
      - web_next:/workspace/apps/web/.next
    depends_on:
      deps:
        condition: service_completed_successfully
      cms:
        condition: service_started

volumes:
  postgres_data:
  pnpm_store:
  root_node_modules:
  cms_node_modules:
  web_node_modules:
  ui_node_modules:
  cms_next:
  web_next:
