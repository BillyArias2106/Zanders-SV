services:
  deps:
    image: node:22-bookworm-slim
    working_dir: /workspace
    environment:
      CI: 'true'
    command: >
      sh -lc "corepack enable &&
      corepack prepare pnpm@10.18.2 --activate &&
      pnpm config set store-dir /pnpm/store &&
      DEPS_HASH=$$(sha256sum pnpm-lock.yaml package.json pnpm-workspace.yaml apps/cms/package.json apps/web/package.json packages/ui/package.json packages/page-sections/package.json | sha256sum | cut -d ' ' -f1) &&
      if [ -f node_modules/.docker-deps-hash ] &&
      [ -d apps/cms/node_modules/payload ] &&
      [ -d apps/web/node_modules/next ] &&
      [ \"$$DEPS_HASH\" = \"$$(cat node_modules/.docker-deps-hash)\" ]; then
      echo 'Dependencies unchanged; skipping pnpm install';
      else
      pnpm install --frozen-lockfile=false --prefer-offline &&
      echo \"$$DEPS_HASH\" > node_modules/.docker-deps-hash;
      fi"
    volumes:
      - .:/workspace
      - corepack_cache:/root/.cache/node/corepack
      - pnpm_store:/pnpm/store
      - root_node_modules:/workspace/node_modules
      - cms_node_modules:/workspace/apps/cms/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - ui_node_modules:/workspace/packages/ui/node_modules

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_dev_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d app']
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 90s

  cms:
    image: node:22-bookworm-slim
    working_dir: /workspace
    command: >
      sh -lc "corepack enable &&
      corepack prepare pnpm@10.18.2 --activate &&
      pnpm --filter @starter/cms migrate &&
      pnpm --filter @starter/cms dev"
    environment:
      CI: 'true'
      DATABASE_URL: postgresql://app:app_dev_password@postgres:5432/app
      PAYLOAD_DB_PUSH: 'false'
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-dev-only-change-me}
      PAYLOAD_PUBLIC_SERVER_URL: http://localhost:3001
      WEB_PUBLIC_URL: http://localhost:3000
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-New Site}
      NEXT_TELEMETRY_DISABLED: '1'
    ports:
      - '3001:3001'
    volumes:
      - .:/workspace
      - corepack_cache:/root/.cache/node/corepack
      - pnpm_store:/pnpm/store
      - root_node_modules:/workspace/node_modules
      - cms_node_modules:/workspace/apps/cms/node_modules
      - cms_next:/workspace/apps/cms/.next
    depends_on:
      deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  web:
    image: node:22-bookworm-slim
    working_dir: /workspace
    command: >
      sh -lc "corepack enable &&
      corepack prepare pnpm@10.18.2 --activate &&
      pnpm --filter @starter/web dev"
    environment:
      CMS_INTERNAL_URL: http://cms:3001
      NEXT_PUBLIC_CMS_URL: http://localhost:3001
      NEXT_TELEMETRY_DISABLED: '1'
    ports:
      - '3000:3000'
    volumes:
      - .:/workspace
      - corepack_cache:/root/.cache/node/corepack
      - pnpm_store:/pnpm/store
      - root_node_modules:/workspace/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - ui_node_modules:/workspace/packages/ui/node_modules
      - web_next:/workspace/apps/web/.next
    depends_on:
      deps:
        condition: service_completed_successfully
      cms:
        condition: service_started

volumes:
  corepack_cache:
  postgres_data:
  pnpm_store:
  root_node_modules:
  cms_node_modules:
  web_node_modules:
  ui_node_modules:
  cms_next:
  web_next:
